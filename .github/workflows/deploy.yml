name: Deploy to Firefox Add-ons (AMO)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Publish to AMO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web-ext and jq
        run: npm install -g web-ext

      - name: Bump version in manifest
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp && mv manifest.tmp manifest.json
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Deploying version $VERSION"

      - name: Validate extension
        run: web-ext lint --source-dir=.

      - name: Build extension
        run: web-ext build --source-dir=. --artifacts-dir=./web-ext-artifacts --overwrite-dest

      - name: Sign and publish to AMO
        run: |
          web-ext sign \
            --source-dir=. \
            --channel=listed \
            --amo-metadata=amo-metadata.json \
            --approval-timeout=0 \
            --api-key=${{ secrets.AMO_JWT_ISSUER }} \
            --api-secret=${{ secrets.AMO_JWT_SECRET }}
